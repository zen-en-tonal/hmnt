services:
  test-db:
    image: postgres:16-alpine
    container_name: hmnt-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hmnt_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hmnt_test"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - hmnt_test_db_data:/var/lib/postgresql/data

volumes:
  hmnt_test_db_data:
