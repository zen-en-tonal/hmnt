name: Setup Elixir Project
description: Set up Elixir, restore caches, fetch dependencies, and optionally compile.
inputs:
  elixir-version:
    required: true
  otp-version:
    required: true
  build-deps:
    required: false
    default: true
  build-app:
    required: false
    default: true
  build-flags:
    required: false
    default: --all-warnings
  cache-key:
    required: false
    default: v1
outputs:
  otp-version:
    description: Exact OTP version selected by setup-beam
    value: ${{ steps.beam.outputs.otp-version }}
  elixir-version:
    description: Exact Elixir version selected by setup-beam
    value: ${{ steps.beam.outputs.elixir-version }}
runs:
  using: composite
  steps:
    - name: Setup BEAM
      uses: erlef/setup-beam@v1
      id: beam
      with:
        elixir-version: ${{ inputs.elixir-version }}
        otp-version: ${{ inputs.otp-version }}

    - name: Restore deps cache
      uses: actions/cache@v4
      with:
        path: deps
        key: deps-${{ inputs.cache-key }}-${{ runner.os }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          deps-${{ inputs.cache-key }}-${{ runner.os }}-

    - name: Restore build cache
      uses: actions/cache@v4
      with:
        path: _build/${{ env.MIX_ENV }}
        key: build-${{ inputs.cache-key }}-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ env.MIX_ENV }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          build-${{ inputs.cache-key }}-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ env.MIX_ENV }}-

    - name: Restore Hex cache
      uses: actions/cache@v4
      with:
        path: ~/.hex
        key: hex-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          hex-${{ runner.os }}-${{ steps.beam.outputs.otp-version }}-${{ steps.beam.outputs.elixir-version }}-

    - name: Clean on retry
      if: github.run_attempt != '1'
      run: |
        mix deps.clean --all
        mix clean
      shell: sh

    - name: Install Hex
      run: mix local.hex --force
      shell: sh

    - name: Install Rebar
      run: mix local.rebar --force
      shell: sh

    - name: Fetch dependencies
      run: mix deps.get
      shell: sh

    - name: Compile dependencies
      if: inputs.build-deps == 'true'
      run: mix loadpaths
      shell: sh

    - name: Compile application
      if: inputs.build-app == 'true'
      run: mix compile ${{ inputs.build-flags }}
      shell: sh
